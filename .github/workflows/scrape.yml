name: Daily GG.Deals Scraper

on:
  schedule:
    # Roda todos os dias às 13:00 UTC (10:00 AM Horário de Brasília)
    - cron: '0 13 * * *'
  workflow_dispatch: # Permite rodar manualmente pelo painel do GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Necessário para fazer push do arquivo JSON

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install scrapling msgspec curl_cffi patchright browserforge schedule

      - name: Install Patchright Browser
        run: python -m patchright install chromium

      - name: Run Scraper
        env:
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          GITHUB_ACTIONS: "true"
        run: python scraper.py

      - name: Commit and Push results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add deals_steam_abaixo_10_*.json
          git commit -m "Automated update: New Steam deals found" || echo "No changes to commit"
          git push
