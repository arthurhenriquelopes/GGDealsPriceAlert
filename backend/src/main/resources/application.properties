spring.application.name=price-alert
# Supabase Configuration (PostgreSQL)
spring.datasource.url=jdbc:postgresql://${SUPABASE_DB_URL:localhost:5432/postgres}
spring.datasource.username=${SUPABASE_DB_USER:postgres}
spring.datasource.password=${SUPABASE_DB_PASSWORD:password}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
